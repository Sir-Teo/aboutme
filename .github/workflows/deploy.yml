name: Deploy to Firebase Hosting

# Builds the Next static export and deploys it to Firebase Hosting on every
# push to main. Requires one repo secret: FIREBASE_TOKEN.
# Generate it locally with:  firebase login:ci
# then add it under GitHub repo Settings -> Secrets and variables -> Actions
# as a secret named FIREBASE_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx --yes firebase-tools@latest deploy --only hosting --project personal-website-3bc37 --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
